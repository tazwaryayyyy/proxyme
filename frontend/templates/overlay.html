<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Me — Overlay</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-mono/style.css" />
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --surface: rgba(10,10,15,0.85);
    --surface2: rgba(20,20,25,0.95);
    --border: #1A1A1A;
    --border2: rgba(255,255,255,0.08);
    --text: #ffffff; --muted: #FFFFFF99;
    --accent: #8B5CF6; --accent2: #a594f9;
    --accent-glow: rgba(139, 92, 246, 0.3);
    --green: #34d399; --amber: #8B5CF6; --red: #ef4444;
    --glow: rgba(139,92,246,0.25);
    --blur: blur(20px);
  }
  html,body { background:#0a0a0f; font-family:'Geist Sans',sans-serif; color:var(--text); font-weight:300; height:100%; overflow:hidden; }

  #overlay {
    position:fixed; right:24px; top:24px; width:calc(100vw - 48px); max-width:380px;
    max-height:calc(100vh - 48px); display:flex; flex-direction:column;
    gap:12px; z-index:9999; overflow-y:auto; scrollbar-width:none; padding:16px;
    background: var(--surface);
    backdrop-filter: var(--blur);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02), 0 24px 64px rgba(0,0,0,0.6);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #overlay.needs-approval {
    border-color: rgba(239,68,68,0.5);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02), 0 24px 64px rgba(0,0,0,0.6), inset 0 0 20px rgba(239,68,68,0.05), 0 0 30px rgba(239,68,68,0.1);
  }


  /* Consent banner */
  #consent-banner {
    background:rgba(139,92,246,0.05); border:1px solid rgba(139,92,246,0.15);
    border-radius:12px; padding:12px 16px;
    display:flex; align-items:center; gap:12px;
  }
  #consent-banner .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; animation:pulse 2s infinite; box-shadow: 0 0 10px var(--accent-glow); }
  #consent-banner span { font-size:12px; font-family:'Geist Mono',monospace; color:var(--text); letter-spacing:0.04em; flex:1; text-transform: lowercase; opacity: 0.9; }
  #consent-banner button { background:none; border:none; color:rgba(139,92,246,0.6); cursor:pointer; font-size:16px; transition: color 0.3s; }
  #consent-banner button:hover { color: #fff; }

  /* Header */
  #header {
    background: rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.01);
  }
  #status-dot { width:10px; height:10px; border-radius:50%; background:var(--muted); transition:all 0.4s; flex-shrink:0; }
  #status-dot.listening { background:var(--green); box-shadow:0 0 12px rgba(52,211,153,0.4); animation:pulse 2s infinite; }
  #status-dot.processing { background:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
  #status-dot.approval { background:var(--red); box-shadow:0 0 12px rgba(239,68,68,0.6); }
  
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  #status-text { font-size:12px; font-family:'Geist Mono',monospace; color:var(--muted); flex:1; letter-spacing:0.04em; text-transform: lowercase; transition: color 0.3s; }

  #waveform { display:flex; align-items:center; gap:3px; height:16px; }
  .wave-bar { width:2px; background:var(--accent); border-radius:1px; height:4px; }
  .wave-bar.active { animation:wave 0.8s ease-in-out infinite; }
  .wave-bar:nth-child(2){animation-delay:.1s}.wave-bar:nth-child(3){animation-delay:.2s}
  .wave-bar:nth-child(4){animation-delay:.15s}.wave-bar:nth-child(5){animation-delay:.05s}
  @keyframes wave { 0%,100%{height:4px} 50%{height:14px} }

  #toggle-btn {
    background:rgba(255,255,255,0.03); border:1px solid var(--border2); border-radius:6px;
    padding:6px 12px; color:var(--muted); font-size:11px; font-family:'Geist Mono',monospace; font-weight:500; cursor:pointer; transition:all 0.3s;
  }
  #toggle-btn:hover { border-color:var(--accent); color:var(--text); background:rgba(139,92,246,0.1); }
  #toggle-btn.active { background:var(--glow); border-color:var(--accent); color:var(--accent); box-shadow: inset 0 0 8px rgba(139,92,246,0.3); }

  #end-btn {
    background:none; border:1px solid rgba(248,113,113,0.25); border-radius:6px;
    padding:6px 12px; color:rgba(248,113,113,0.5); font-size:11px; font-family:'Geist Mono',monospace; font-weight:500; cursor:pointer; transition:all 0.3s;
  }
  #end-btn:hover { border-color:var(--red); color:var(--red); background:rgba(248,113,113,0.1); }

  /* Ticker */
  #flow-ticker {
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Geist Mono', monospace; font-weight:500;
    font-size: 11px;
    color: var(--accent);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: all 0.4s;
    margin-bottom: 8px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  }
  #flow-ticker.hidden { display: none; }
  .ticker-item { animation: slideInTicker 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes slideInTicker { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  /* Transcript */
  #transcript-box {
    background:rgba(0,0,0,0.5); border:1px solid var(--border); border-radius:12px;
    padding:16px 20px; min-height:60px; max-height:100px; overflow:hidden;
    font-family:'Geist Sans',sans-serif; font-size:clamp(13px, 1.5vh, 16px); color:var(--muted); line-height:1.6; font-weight:300;
    transition:all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
  }
  #transcript-box.active { color:var(--text); animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0.5; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

  #cards { display:flex; flex-direction:column; gap:12px; }

  /* Suggestion card */
  .suggestion-card {
    background:rgba(20,20,20,0.8); border:1px solid var(--border); border-left:3px solid var(--green);
    border-radius:12px; padding:20px; animation:slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.02), 0 12px 24px rgba(0,0,0,0.4);
    display: flex; flex-direction: column; gap: 8px;
  }

  /* Approval card */
  .approval-card {
    background:rgba(20,20,20,0.8); border:1px solid var(--border);
    border-radius:12px; padding:20px; 
    animation:slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.02), 0 12px 40px rgba(0,0,0,0.5);
    background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 4px 4px;
    display: flex; flex-direction: column; gap: 8px;
  }

  @keyframes slideIn { from{opacity:0;transform:translateY(16px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes slideOut { from{opacity:1;transform:translateY(0) scale(1)} to{opacity:0;transform:translateY(12px) scale(0.97)} }
  .removing { animation:slideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

  .card-label {
    font-size:12px; font-weight:500; font-family:'Geist Mono',monospace; letter-spacing:0.04em; margin-bottom:8px;
    display:flex; align-items:center; gap:8px; text-transform: lowercase; opacity: 0.9;
  }
  .card-label.green { color:var(--green); text-shadow: 0 0 10px rgba(52,211,153,0.3); }
  .card-label.purple { color:var(--accent); }
  .card-label.red-warn { color:var(--red); text-shadow: 0 0 12px rgba(239,68,68,0.4); }
  .card-label.purple-pulse { color:var(--accent); animation:pulse 1s infinite; text-shadow: 0 0 10px var(--accent-glow); }
  .card-label::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }

  .card-text { font-size:15px; line-height:1.6; color:var(--text); font-weight:300; }
  .card-question { font-size:13px; font-family:'Geist Mono',monospace; color:var(--muted); font-style:italic; }
  .card-preview {
    font-size:14px; line-height:1.6; color:var(--text); background:rgba(0,0,0,0.5);
    border-radius:8px; padding:12px 16px; border-left:2px solid var(--accent); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
  }

  .reasoning { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top: 4px; }
  .reason-pill {
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:6px;
    padding:4px 8px; font-size:10px; font-weight:500; font-family:'Geist Mono',monospace; color:var(--text-dim); text-transform:lowercase;
  }

  .card-reason { margin-top:8px; font-size:12px; font-family:'Geist Mono',monospace; color:var(--muted); }

  /* CIBA waiting indicator */
  .ciba-waiting {
    margin-top:12px;
    background:rgba(139,92,246,0.06);
    border:1px solid var(--border2);
    border-radius:8px;
    padding:12px 14px;
    display:flex; align-items:center; gap:12px;
  }
  .ciba-spinner {
    width:20px; height:20px; border-radius:50%;
    border:2px solid var(--border2);
    border-top-color:var(--accent);
    animation:spin 1s linear infinite; flex-shrink:0;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .ciba-waiting-text { flex:1; }
  .ciba-waiting-text .ciba-title { font-size:12px; font-family:'Geist Mono',monospace; font-weight:500; color:var(--accent); }
  .ciba-waiting-text .ciba-elapsed { font-size:11px; color:var(--muted); font-family:'Geist Mono',monospace; margin-top:4px; }
  .ciba-mode-badge {
    font-size:10px; font-family:'Geist Mono',monospace; font-weight:500;
    padding:4px 8px; border-radius:6px;
    background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.25); color:var(--accent);
  }

  .card-actions { display:flex; gap:10px; margin-top:16px; }

  .btn-use {
    flex:1; background:var(--green); border:1px solid var(--green); border-radius:8px;
    padding:14px; color:#000; font-size:14px; font-family:'Geist Sans',sans-serif; font-weight:600; cursor:pointer; transition:all 0.3s;
    box-shadow: 0 0 16px rgba(52,211,153,0.3);
  }
  .btn-use:hover { opacity:0.9; transform: translateY(-1px); box-shadow: 0 0 24px rgba(52,211,153,0.5); }

  .btn-dismiss {
    background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:14px 20px;
    color:var(--text); font-size:14px; font-family:'Geist Sans',sans-serif; cursor:pointer; transition:all 0.3s;
  }
  .btn-dismiss:hover { background: rgba(255,255,255,0.1); border-color:var(--border2); }

  .btn-approve {
    flex:1; background:var(--accent); border:1px solid rgba(255,255,255,0.1); border-radius:8px;
    padding:14px; color:#fff; font-size:14px; font-family:'Geist Sans',sans-serif; font-weight:600; cursor:pointer; transition:all 0.4s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 20px var(--glow);
  }
  .btn-approve:hover { box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 32px rgba(139,92,246,0.6); filter:brightness(1.1); transform:translateY(-1px); }

  .btn-deny {
    background:transparent; border:1px solid var(--border2); border-radius:8px; padding:14px 20px;
    color:var(--text); font-size:14px; font-family:'Geist Sans',sans-serif; font-weight:600; cursor:pointer; transition:all 0.4s;
    box-shadow: 0 0 10px transparent;
  }
  .btn-deny:hover { border-color:var(--accent); color:var(--accent); box-shadow: inset 0 0 12px var(--glow), 0 0 16px var(--glow); }

  /* Approval specific buttons */
  .approval-card .btn-approve {
    background: var(--red); border-color: rgba(239,68,68,0.5); color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 16px rgba(239,68,68,0.4);
  }
  .approval-card .btn-approve:hover {
    background: #dc2626; box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 0 24px rgba(239,68,68,0.6); transform:translateY(-1px);
  }

  .approval-card .btn-deny {
    border-color: rgba(255,255,255,0.08); color: var(--muted);
  }
  .approval-card .btn-deny:hover {
    background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); color: #fff; box-shadow: none;
  }

  /* History */
  #history {
    background:rgba(0,0,0,0.5); border:1px solid var(--border); border-radius:12px;
    padding:16px; max-height:200px; overflow-y:auto; scrollbar-width:none;
  }
  #history:empty { display:none; }
  .history-item { display:flex; align-items:flex-start; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }
  .history-item:last-child { border-bottom:none; }
  .history-icon { flex-shrink:0; margin-top:2px; font-size:13px; }
  .history-body { flex:1; }
  .history-text { color:var(--text); line-height:1.6; font-family:'Geist Sans',sans-serif; font-size:13px; font-weight:300; }
  .history-pills { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
  .h-pill { font-size:10px; font-family:'Geist Mono',monospace; padding:4px 8px; border-radius:6px; border:1px solid var(--border2); color:var(--muted); }

  /* Demo mode switch */
  .switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 20px;
  }
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 20px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 14px;
    width: 14px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
  }
  input:checked + .slider {
    background-color: var(--accent);
  }
  input:checked + .slider:before {
    transform: translateX(20px);
  }
  .slider.round {
    border-radius: 34px;
  }
  .slider.round:before {
    border-radius: 50%;
  }
</style>
</head>
<body>
<div id="overlay">

  <div id="consent-banner">
    <div class="dot"></div>
    <span>proxy: active</span>
  </div>

  <div id="header">
    <div id="status-dot"></div>
    <span id="status-text">proxy: idle</span>
    <div id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
    </div>
    <button id="toggle-btn" onclick="toggleListening()">START</button>
    <button id="end-btn" onclick="endMeeting()">END</button>
  </div>
  <div id="demo-mode" style="display: flex; align-items: center; gap: 8px; margin-top: 8px; justify-content: flex-end;">
    <span style="font-size: 10px; font-family: 'Geist Mono', monospace;">Demo Mode</span>
    <label class="switch">
      <input type="checkbox" id="demo-toggle">
      <span class="slider round"></span>
    </label>
  </div>
  <div id="auth-status" style="font-size: 10px; font-family: 'Geist Mono', monospace; color: var(--muted); text-align: center; padding: 4px; border-top: 1px solid var(--border); margin-top: 4px;"></div>

  <div id="transcript-box">Waiting for audio...</div>
  <div id="flow-ticker" class="hidden"></div>
  <div id="cards"></div>
  <div id="history"></div>
  <div id="accuracy-badge" style="font-size:10px;font-family:'Geist Mono',monospace;color:var(--muted);text-align:center;margin-top:8px;">Accuracy: --</div>
</div>

<script>
const SESSION_ID = new URLSearchParams(location.search).get('session') || 'demo';
const SUPPORTED_LANGS = ['en-US', 'es-ES', 'fr-FR', 'de-DE', 'zh-CN', 'ja-JP', 'ko-KR', 'it-IT', 'pt-BR', 'ru-RU', 'bn-BD', 'hi-IN'];
const urlLang = new URLSearchParams(location.search).get('lang');
const langParam = SUPPORTED_LANGS.includes(urlLang) ? urlLang : 'en-US';
let ws = null, isListening = false, recognition = null;
const decisionLog = [];
const cibaTimers = {};
let tickerTimeout = null;
let demoMode = false;
// Track rendered card IDs to prevent duplicates on WS reconnect
const renderedApprovals = new Set();
const renderedSuggestions = new Set();

// Demo mode listener
const demoCheckbox = document.getElementById('demo-toggle');
if (demoCheckbox) {
    demoCheckbox.addEventListener('change', (e) => { demoMode = e.target.checked; });
}

// --- WS keepalive so connection survives window minimize ---
let keepaliveInterval = null;
function startKeepalive() {
  stopKeepalive();
  keepaliveInterval = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      try { ws.send(JSON.stringify({ type: 'ping' })); } catch(e) {}
    }
  }, 25000);
}
function stopKeepalive() {
  if (keepaliveInterval) { clearInterval(keepaliveInterval); keepaliveInterval = null; }
}

function addTicker(text) {
  const ticker = document.getElementById('flow-ticker');
  ticker.classList.remove('hidden');
  const item = document.createElement('div');
  item.className = 'ticker-item';
  item.textContent = text;
  ticker.appendChild(item);
  while(ticker.children.length > 3) ticker.firstChild.remove();
  clearTimeout(tickerTimeout);
  tickerTimeout = setTimeout(() => {
    ticker.innerHTML = '';
    ticker.classList.add('hidden');
  }, 4000);
}

window.addEventListener('load', () => {
  if (SESSION_ID && SESSION_ID !== 'demo') connectWS();
});

function setStatus(state, text) {
  document.getElementById('status-dot').className = state;
  document.getElementById('status-text').textContent = text;
  document.querySelectorAll('.wave-bar').forEach(b => b.classList.toggle('active', state === 'listening'));
}

// Single source of truth for listening state - avoids double flip
function setListeningState(listening) {
  isListening = listening;
  const btn = document.getElementById('toggle-btn');
  if (listening) {
    startListening();
    btn.textContent = 'STOP';
    btn.classList.add('active');
  } else {
    stopListening();
    btn.textContent = 'START';
    btn.classList.remove('active');
  }
}

function toggleListening() {
  setListeningState(!isListening);
}

function connectWS() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
  const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${wsProtocol}//${location.host}/ws/${SESSION_ID}`);
  ws.onopen = () => {
    startKeepalive();
    if (isListening) {
      setStatus('listening', 'proxy: listening');
      document.getElementById('toggle-btn').textContent = 'STOP';
      document.getElementById('toggle-btn').classList.add('active');
    } else {
      setStatus('', 'proxy: connected (paused)');
      document.getElementById('toggle-btn').textContent = 'START';
      document.getElementById('toggle-btn').classList.remove('active');
    }
  };
  ws.onclose = () => {
    stopKeepalive();
    setStatus('', 'proxy: reconnecting...');
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => { /* handled via onclose */ };
  ws.onmessage = (e) => {
    try { handleMessage(JSON.parse(e.data)); } catch(err) {}
  };
}

function handleMessage(msg) {
  if (msg.type === 'pong' || msg.type === 'ping') return;
  if (msg.type === 'flow_ticker') { addTicker(msg.message); }
  else if (msg.type === 'suggestion') { setStatus('listening','proxy: suggestion ready'); showSuggestion(msg); }
  else if (msg.type === 'approval_required') { setStatus('approval','proxy: approval needed'); showApproval(msg); }
  else if (msg.type === 'denied') {
    addHistory({type:'deny', text:msg.message||'Handled manually', topic:'—', time:now()});
    setStatus('listening','proxy: listening');
    const card = document.querySelector(`[data-approval-id="${msg.approval_id}"]`);
    if (card) { clearInterval(cibaTimers[msg.approval_id]); dismiss(card); }
    renderedApprovals.delete(msg.approval_id);
    document.getElementById('overlay').classList.remove('needs-approval');
  }
  else if (msg.type === 'timeout') {
    addHistory({type:'timeout', text:msg.message||'Approval timed out', topic:'—', time:now()});
    setStatus('listening','proxy: listening');
    const card = document.querySelector(`[data-approval-id="${msg.approval_id}"]`);
    if (card) { clearInterval(cibaTimers[msg.approval_id]); dismiss(card); }
    renderedApprovals.delete(msg.approval_id);
    document.getElementById('overlay').classList.remove('needs-approval');
  }
}

function buildReasoningPills(msg) {
  const pills = [];
  if (msg.topic) pills.push(`<span class="reason-pill topic">topic: ${msg.topic}</span>`);
  if (msg.matched_rule) pills.push(`<span class="reason-pill rule">rule: ${msg.matched_rule}</span>`);
  if (msg.fga_label) pills.push(`<span class="reason-pill fga">FGA: ${msg.fga_label}</span>`);
  if (msg.layer) pills.push(`<span class="reason-pill">layer: ${msg.layer}</span>`);
  if (msg.confidence != null) pills.push(`<span class="reason-pill conf">conf: ${Math.round(msg.confidence*100)}%</span>`);
  return pills.length ? `<div class="reasoning">${pills.join('')}</div>` : '';
}

function showSuggestion(msg) {
  // Deduplicate — same suggestion can come twice after reconnect
  const key = msg.suggestion_id || msg.text || '';
  if (renderedSuggestions.has(key)) return;
  renderedSuggestions.add(key);

  const card = document.createElement('div');
  card.className = 'suggestion-card';

  // Use textContent to safely set text — avoids innerHTML quote-breaking issues
  const labelEl = document.createElement('div');
  labelEl.className = 'card-label green';
  labelEl.textContent = `auto-approved · ${msg.topic||'general'}`;

  const textEl = document.createElement('div');
  textEl.className = 'card-text';
  textEl.textContent = msg.text || '';

  const pillsWrapper = document.createElement('div');
  pillsWrapper.innerHTML = buildReasoningPills(msg);

  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const useBtn = document.createElement('button');
  useBtn.className = 'btn-use';
  useBtn.textContent = 'use this';
  useBtn.addEventListener('click', () => useResponse(useBtn, msg.text || '', msg.topic || 'general'));

  const dismissBtn = document.createElement('button');
  dismissBtn.className = 'btn-dismiss';
  dismissBtn.textContent = 'dismiss';
  dismissBtn.addEventListener('click', () => { renderedSuggestions.delete(key); dismiss(card); });

  actions.append(useBtn, dismissBtn);
  card.append(labelEl, textEl, pillsWrapper, actions);
  document.getElementById('cards').prepend(card);

  // Auto-dismiss after 20s
  setTimeout(() => { if (card.parentNode) { renderedSuggestions.delete(key); dismiss(card); } }, 20000);
}

function showApproval(msg) {
  // Deduplicate — same approval can come twice after WS reconnect
  if (renderedApprovals.has(msg.approval_id)) return;
  renderedApprovals.add(msg.approval_id);

  const card = document.createElement('div');
  card.className = 'approval-card';
  card.dataset.approvalId = msg.approval_id;

  const isGuardian = msg.ciba_mode === 'guardian';
  const modeLabel = isGuardian ? 'GUARDIAN PUSH' : 'OVERLAY';

  // Label
  const labelEl = document.createElement('div');
  labelEl.className = 'card-label red-warn';
  labelEl.textContent = `approval required · ${msg.topic||'sensitive'}`;

  // Reason
  const reasonEl = document.createElement('div');
  reasonEl.className = 'card-reason';
  reasonEl.textContent = (msg.reason||'potential commitment detected').toLowerCase();

  // Question
  const questionEl = document.createElement('div');
  questionEl.className = 'card-question';
  questionEl.textContent = `"${msg.question||''}"`;

  // Preview
  const previewEl = document.createElement('div');
  previewEl.className = 'card-preview';
  previewEl.textContent = msg.suggested_response || '';

  // Pills
  const pillsWrapper = document.createElement('div');
  pillsWrapper.innerHTML = buildReasoningPills(msg);

  // CIBA waiting
  const cibaWait = document.createElement('div');
  cibaWait.className = 'ciba-waiting';
  cibaWait.id = `ciba-wait-${msg.approval_id}`;
  cibaWait.innerHTML = `
    <div class="ciba-spinner"></div>
    <div class="ciba-waiting-text">
      <div class="ciba-title">${isGuardian ? 'Waiting for Guardian approval on your phone...' : 'Waiting for your approval...'}</div>
      <div class="ciba-elapsed" id="elapsed-${msg.approval_id}">0s elapsed</div>
    </div>
    <span class="ciba-mode-badge">${modeLabel}</span>
  `;

  // Actions
  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const approveBtn = document.createElement('button');
  approveBtn.className = 'btn-approve';
  approveBtn.textContent = 'approve & use';
  approveBtn.addEventListener('click', () => respond(msg.approval_id, true, card, msg.topic||'sensitive', msg.suggested_response||''));

  const denyBtn = document.createElement('button');
  denyBtn.className = 'btn-deny';
  denyBtn.textContent = "i'll handle it";
  denyBtn.addEventListener('click', () => respond(msg.approval_id, false, card, msg.topic||'sensitive', ''));

  actions.append(approveBtn, denyBtn);
  card.append(labelEl, reasonEl, questionEl, previewEl, pillsWrapper, cibaWait, actions);
  document.getElementById('cards').prepend(card);
  document.getElementById('overlay').classList.add('needs-approval');

  // Auto-approve in demo mode after a brief delay
  if (demoMode) {
    setTimeout(() => {
      if (card.parentNode && renderedApprovals.has(msg.approval_id)) {
        respond(msg.approval_id, true, card, msg.topic || 'sensitive', msg.suggested_response || '');
      }
    }, 500);
  }

  // Elapsed timer
  const start = Date.now();
  cibaTimers[msg.approval_id] = setInterval(() => {
    const el = document.getElementById(`elapsed-${msg.approval_id}`);
    if (el) {
      const secs = Math.floor((Date.now()-start)/1000);
      el.textContent = `${secs}s elapsed`;
      if (secs > 25) el.style.color = 'var(--amber)';
    } else {
      clearInterval(cibaTimers[msg.approval_id]);
    }
  }, 1000);
}

function respond(approvalId, approved, card, topic, text) {
  clearInterval(cibaTimers[approvalId]);
  renderedApprovals.delete(approvalId);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'approval_response', approval_id: approvalId, approved }));
  }
  addHistory({
    type: approved ? 'approve' : 'deny',
    text: approved ? `Approved: "${text.slice(0,55)}..."` : 'Handled manually',
    topic, time: now()
  });
  document.getElementById('overlay').classList.remove('needs-approval');
  dismiss(card);
  if (isListening) setStatus('listening', 'proxy: listening');
}

function useResponse(btn, text, topic) {
  navigator.clipboard.writeText(text).catch(() => {});
  btn.textContent = 'copied!';
  btn.style.background = 'rgba(52,211,153,0.25)';
  addHistory({ type: 'use', text: `Used: "${text.slice(0,55)}..."`, topic, time: now() });
  setTimeout(() => dismiss(btn.closest('.suggestion-card')), 1200);
}

function dismiss(card) {
  if (!card || !card.parentNode) return;
  card.classList.add('removing');
  setTimeout(() => card.remove(), 250);
}

function now() {
  return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function addHistory(entry) {
  decisionLog.push(entry);
  const history = document.getElementById('history');
  const icons = { approve:'✓', deny:'—', use:'↗', timeout:'⏱', auto:'·' };
  const item = document.createElement('div');
  item.className = 'history-item';
  const iconEl = document.createElement('span');
  iconEl.className = 'history-icon';
  iconEl.textContent = icons[entry.type] || '·';
  const bodyEl = document.createElement('div');
  bodyEl.className = 'history-body';
  
  const textDiv = document.createElement('div');
  textDiv.className = 'history-text';
  textDiv.textContent = entry.text;
  
  const pillsDiv = document.createElement('div');
  pillsDiv.className = 'history-pills';
  const typeClass = entry.type === 'approve' ? 'approved' : entry.type === 'deny' ? 'denied' : 'auto';
  pillsDiv.innerHTML = `
    <span class="h-pill ${typeClass}">${entry.type}</span>
    <span class="h-pill">topic: ${entry.topic}</span>
    <span class="h-pill">${entry.time}</span>
  `;
  
  bodyEl.appendChild(textDiv);
  bodyEl.appendChild(pillsDiv);
  item.append(iconEl, bodyEl);
  history.prepend(item);
  while (history.children.length > 10) history.lastChild.remove();
  updateAccuracy();
}

function endMeeting() {
  stopListening();
  sessionStorage.setItem('proxyme_log', JSON.stringify(decisionLog));
  sessionStorage.setItem('proxyme_session', SESSION_ID);
  window.open(`/summary?session=${SESSION_ID}`, '_blank');
}

function startListening() {
  connectWS();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('','Speech recognition not supported'); return; }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = langParam;
  recognition.maxAlternatives = 1;

  let finalBuffer = '', debounce = null;

  function flush() {
    const text = finalBuffer.trim();
    finalBuffer = '';
    if (text.length > 5 && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'transcript', text }));
      setStatus('processing', 'proxy: processing...');
    }
  }

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }

    const box = document.getElementById('transcript-box');
    box.classList.add('active');
    box.textContent = (finalBuffer + final + interim).slice(-300);

    if (final) {
      finalBuffer += final;
      clearTimeout(debounce);

      // If buffer is getting very long, flush immediately after a natural break
      if (finalBuffer.length > 500) {
        flush();
        return;
      }

      // Otherwise wait 2.5s of silence before sending
      debounce = setTimeout(flush, 2500);
    }
  };

  recognition.onstart = () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      setStatus('listening', 'proxy: listening');
    } else {
      setStatus('', 'proxy: connecting...');
    }
  };

  recognition.onerror = (event) => {
    // 'no-speech' just means silence — don't show an error
    if (event.error === 'no-speech') return;
    // 'aborted' happens on stop() — ignore it
    if (event.error === 'aborted') return;
    setStatus('', `proxy: mic error (${event.error})`);
  };

  recognition.onend = () => {
    // Flush any remaining buffer when recognition ends naturally
    if (finalBuffer.trim().length > 5) flush();
    if (isListening) recognition.start();
  };

  recognition.start();
}

function updateAccuracy() {
    if (decisionLog.length === 0) {
        document.getElementById('accuracy-badge').textContent = 'Accuracy: --';
        return;
    }
    const recent = decisionLog.slice(-10);
    let positive = 0, negative = 0;
    recent.forEach(d => {
        if (d.type === 'use' || d.type === 'approve') positive++;
        else if (d.type === 'deny' || d.type === 'timeout') negative++;
    });
    const total = positive + negative;
    const accuracy = total > 0 ? Math.round((positive / total) * 100) : 0;
    document.getElementById('accuracy-badge').textContent = `Accuracy (last ${total}): ${accuracy}%`;
}

async function fetchRole() {
    const res = await fetch(`/api/session/${SESSION_ID}/role`);
    if (res.ok) {
        const data = await res.json();
        const statusDiv = document.getElementById('auth-status');
        if (statusDiv) {
            statusDiv.textContent = `Role: ${data.label || data.role} | Authorization: ${data.allowed_topics?.join(', ') || 'custom'}`;
        }
    }
}

fetchRole().catch(() => {
    const statusDiv = document.getElementById('auth-status');
    if (statusDiv) statusDiv.textContent = 'Role: unavailable';
});

function stopListening() {
  if (recognition) { recognition.stop(); recognition = null; }
  isListening = false;
  setStatus('', 'proxy: idle');
  const box = document.getElementById('transcript-box');
  box.classList.remove('active');
  box.textContent = 'Waiting for audio...';
  document.getElementById('toggle-btn').textContent = 'START';
  document.getElementById('toggle-btn').classList.remove('active');
}
</script>
